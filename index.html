<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR-Animaplanos</title>
    <!-- manifest link (App Shell) -->
    <link rel="manifest" href="./manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #4F46E5;
            --primary-hover: #4338CA;
            --secondary: #10B981;
            --secondary-hover: #059669;
            --bg-color: #F3F4F6;
            --sidebar-bg: #FFFFFF;
            --text-dark: #1F2937;
            --border-color: #E5E7EB;
            --danger: #EF4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-dark);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        header {
            background: var(--sidebar-bg);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            text-align: center;
            z-index: 20;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--primary);
            letter-spacing: -0.5px;
        }

        .header-btn {
            background: none;
            border: 1px solid var(--border-color);
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            cursor: pointer;
            font-weight: 600;
        }
        .header-btn:hover { background: var(--bg-color); }

        main {
            flex: 1;
            position: relative;
            overflow: hidden; /* Canvas maneja su propio overflow en el layout */
        }

        /* Utilidades de Vistas */
        .view-container {
            width: 100%;
            height: 100%;
            display: flex;
            animation: fadeIn 0.3s ease-in-out;
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Pantalla de Inicio */
        #home-view {
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .home-menu {
            display: flex;
            flex-direction: column;
            gap: 2rem;
            width: 100%;
            max-width: 400px;
        }

        .btn-large {
            padding: 1.5rem 2rem;
            font-size: 1.25rem;
            font-weight: 600;
            border: none;
            border-radius: 1rem;
            cursor: pointer;
            color: white;
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.5rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .btn-large:hover { transform: translateY(-3px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1); }
        .btn-profesor { background: linear-gradient(135deg, var(--primary), #8B5CF6); }
        .btn-escaner { background: linear-gradient(135deg, var(--secondary), #34D399); }
        .btn-icon { font-size: 2.5rem; }

        /* DISEÑADOR AVANZADO (GRID LAYOUT) */
        #designer-view {
            display: flex;
            flex-direction: row;
        }

        .designer-sidebar {
            width: 320px;
            min-width: 320px;
            background: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 1.5rem;
            overflow-y: auto;
            box-shadow: 4px 0 10px rgba(0,0,0,0.02);
            z-index: 10;
        }

        .designer-sidebar h3 { font-size: 1.1rem; margin-bottom: 0.5rem; color: var(--primary); }
        .designer-sidebar h4 { font-size: 0.9rem; margin-top: 1.5rem; margin-bottom: 0.5rem; text-transform: uppercase; color: #6B7280; letter-spacing: 0.05em; }
        
        .form-group { display: flex; flex-direction: column; gap: 0.3rem; margin-bottom: 1rem; }
        .form-group label { font-size: 0.9rem; font-weight: 500; }
        .form-group select, .form-group input[type="text"] {
            padding: 0.6rem; border: 1px solid var(--border-color); border-radius: 0.4rem; font-size: 0.95rem; background: var(--bg-color);
        }

        .btn { padding: 0.6rem 1rem; border: 1px solid var(--border-color); background: white; border-radius: 0.4rem; cursor: pointer; font-weight: 500; font-size: 0.9rem; transition: background 0.2s;}
        .btn:hover { background: var(--bg-color); }
        .btn-blue { background: var(--primary); color: white; border: none; }
        .btn-blue:hover { background: var(--primary-hover); }
        .btn-green { background: var(--secondary); color: white; border: none; }
        .btn-green:hover { background: var(--secondary-hover); }

        .flex-row { display: flex; gap: 0.5rem; }
        .flex-row > button { flex: 1; }

        /* Toggle switches */
        .toggle-label {
            display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.9rem; margin-bottom: 0.5rem;
        }

        /* Tabla CRUD Coordenadas */
        .table-container {
            border: 1px solid var(--border-color); border-radius: 0.5rem; overflow: hidden; margin-bottom: 1rem;
        }
        table { width: 100%; border-collapse: collapse; text-align: center; }
        th { background: var(--bg-color); padding: 0.5rem; font-size: 0.8rem; font-weight: 600; border-bottom: 1px solid var(--border-color); }
        td { padding: 0.2rem; border-bottom: 1px solid var(--border-color); }
        td input { width: 100%; padding: 0.4rem; border: 1px solid transparent; text-align: center; font-family: monospace; border-radius: 0.3rem; }
        td input:focus { border-color: var(--primary); outline: none; background: #EEF2FF; }
        .btn-icon-small { background: transparent; border: none; font-size: 1.2rem; cursor: pointer; color: var(--danger); opacity: 0.7;}
        .btn-icon-small:hover { opacity: 1; transform: scale(1.1); }

        .designer-main {
            flex: 1;
            position: relative;
            background: #FAFAFA;
            /* Fondo de cuadricula sutil mediante CSS (opcional, lo haremos en Canvas) */
            display: flex;
            flex-direction: column;
        }

        #cartesian-canvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }
        #cartesian-canvas:active { cursor: grabbing; }

        /* Tooltip flotante para el Canvas */
        #canvas-tooltip {
            position: absolute;
            background: rgba(17, 24, 39, 0.8);
            color: white;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            pointer-events: none;
            display: none;
            z-index: 50;
            white-space: nowrap;
        }

        /* Escáner */
        #scanner-view { align-items: center; justify-content: center; background: #000; flex-direction: column;}
        .scanner-container { position: relative; width: 100%; max-width: 600px; aspect-ratio: 4/3; }
        #scanner-video { width: 100%; height: 100%; object-fit: cover; }
        #scanner-canvas { position: absolute; top:0; left:0; width: 100%; height: 100%; z-index: 10; }
        .scanner-tools { 
            position: absolute; 
            top: 1rem; 
            left: 50%;
            transform: translateX(-50%);
            display: flex; 
            gap: 1rem; 
            z-index: 20; 
            background: rgba(255, 255, 255, 0.15); 
            backdrop-filter: blur(12px); 
            -webkit-backdrop-filter: blur(12px);
            padding: 0.8rem 1.5rem; 
            border-radius: 2rem; 
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.2);
        }

        /* Title for printing */
        .print-only-title { display: none; text-align: center; font-size: 2rem; margin-bottom: 1rem; }

        /* Estilos de Impresión Optimizada */
        @media print {
            @page { size: portrait; margin: 1cm; }
            body, html { background: white; margin: 0; padding: 0; min-width: 100%; height: auto; overflow: visible; }
            header, .no-print, .designer-sidebar { display: none !important; }
            .designer-main { display: block; background: white; border: none; width: 100%; padding: 0; }
            #designer-view { display: block; }
            #canvas-wrapper { width: 100% !important; max-width: 18cm !important; margin: 0 auto; display: block; position: relative; } 
            #cartesian-canvas { width: 100% !important; aspect-ratio: 1; margin: 0; border: 4px solid #000 !important;}
            .print-only-title { display: block !important; text-align: center; font-size: 1.5rem; margin-bottom: 1rem; }
            
            #qr-container { display: flex !important; box-shadow: none !important; background: white !important; border: 2px solid black !important; width: 35% !important;} 
            #qr-container p { display: none !important; }
        }

        #qrcode img, #qrcode canvas { width: 100% !important; height: 100% !important; object-fit: contain; }

        /* A-Frame container style */
        .aframe-layer {
            position: absolute; top:0; left:0; width: 100%; height: 100%;
            z-index: 15; pointer-events: none;
        }
    </style>
    <!-- Librerías Externas CDN -->
    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script async src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script async src="https://docs.opencv.org/4.7.0/opencv.js" onload="console.log('OpenCV.js Loaded')" type="text/javascript"></script>
</head>
<body>

    <header class="no-print">
        <h1>AR-Animaplanos</h1>
        <div id="header-tools" class="hidden">
            <button class="header-btn" onclick="navigateTo('home-view')">X Salir al Menú</button>
        </div>
    </header>

    <main>
        <!-- PANTALLA INICIO -->
        <div id="home-view" class="view-container">
            <div class="home-menu">
                <button class="btn-large btn-profesor" onclick="navigateTo('designer-view')">
                    <span class="btn-icon">📐</span>
                    Diseñador (Plano Cartesiano)
                </button>
                <button class="btn-large btn-escaner" onclick="navigateTo('scanner-view')">
                    <span class="btn-icon">📱</span>
                    Escáner de Evalución AR
                </button>
            </div>
        </div>

        <!-- DISEÑADOR -->
        <div id="designer-view" class="view-container hidden">
            <!-- Sidebar -->
            <aside class="designer-sidebar no-print">
                <h3>Control de Datos</h3>
                
                <div class="form-group">
                    <label>Plantillas Precargadas (10)</label>
                    <select id="library-select" onchange="loadPreset(this.value)">
                        <option value="" disabled selected>Selecciona un animal...</option>
                        <!-- Se llena vía JS -->
                    </select>
                </div>

                <div class="flex-row">
                    <input type="file" id="file-import" accept=".json" hidden onchange="importJSON(event)">
                    <button class="btn" onclick="document.getElementById('file-import').click()">📂 Abrir JSON</button>
                    <button class="btn" onclick="exportJSON()">💾 Guardar JSON</button>
                </div>

                <h4>Nombre de la Figura</h4>
                <div class="form-group">
                    <input type="text" id="figure-name" value="Mi Animaplano" onchange="updateFigureName()">
                </div>

                <h4>Vista del Plano</h4>
                <label class="toggle-label"><input type="checkbox" id="chk-axes" checked onchange="drawCartesian()"> Mostrar Ejes X/Y</label>
                <label class="toggle-label"><input type="checkbox" id="chk-points" checked onchange="drawCartesian()"> Mostrar Puntos</label>
                <label class="toggle-label"><input type="checkbox" id="chk-lines" checked onchange="drawCartesian()"> Mostrar Trazos</label>
                <label class="toggle-label"><input type="checkbox" id="chk-labels" checked onchange="drawCartesian()"> Mostrar Etiquetas (X,Y)</label>

                <h4>Impresión Educativa (Modos)</h4>
                <div class="form-group">
                    <button class="btn btn-blue" style="margin-bottom:0.5rem" onclick="printMode('reto')">🖨️ Reto (Solo Puntos)</button>
                    <button class="btn btn-green" style="margin-bottom:0.5rem" onclick="printMode('solucion')">🖨️ Solución (Complejo)</button>
                    <button class="btn" onclick="printMode('vacio')">🖨️ Estructura Vacía</button>
                </div>

                <h4>Coordenadas (C.R.U.D.)</h4>
                <div class="table-container">
                    <table id="points-table">
                        <thead><tr><th>#</th><th>X</th><th>Y</th><th>🗑️</th></tr></thead>
                        <tbody id="points-body">
                            <!-- Filas dinámicas -->
                        </tbody>
                    </table>
                </div>
                <button class="btn" style="width:100%; margin-top:0.5rem;" onclick="addEmptyRow()">+ Añadir Coordenada</button>
                <button class="btn" style="width:100%; margin-top:0.5rem; color: var(--danger)" onclick="clearFigure()">Borrar Todo</button>
            </aside>
            
            <!-- Lienzo -->
            <section class="designer-main">
                <h2 class="print-only-title" id="print-title">Mi Animaplano</h2>
                <div id="canvas-wrapper" style="position: relative; width: 100%; max-width: 25cm; aspect-ratio: 1; margin: 0 auto;">
                    <div id="canvas-tooltip"></div>
                    <canvas id="cartesian-canvas" style="width: 100%; height: 100%; border: 1px solid var(--border-color); display:block;"></canvas>
                    <div id="qr-container" style="display:none; position: absolute; top: 2%; right: 2%; width: 35%; aspect-ratio: 1; background: white; padding: 0; border-radius: 4px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border: 2px solid black; z-index: 5;">
                        <p class="no-print" style="position:absolute; top:-25px; right:0; margin:0; font-weight:600; font-size:0.8rem; white-space:nowrap;">Código QR:</p>
                        <div id="qrcode" style="width:100%; height:100%; display:flex; align-items:center; justify-content:center;"></div>
                    </div>
                </div>
            </section>
        </div>

        <!-- ESCÁNER AR -->
        <div id="scanner-view" class="view-container hidden">
            <div class="print-only-title">Escáner no disponible para impresión.</div>
            <div class="scanner-container no-print">
                <video id="scanner-video" playsinline autoplay></video>
                <canvas id="scanner-canvas"></canvas>
                <!-- Capa 3D A-Frame embebida -->
                <div class="aframe-layer">
                    <a-scene embedded vr-mode-ui="enabled: false"
                             renderer="logarithmicDepthBuffer: true; precision: medium; antialias: true; alpha: true"
                             style="width: 100%; height: 100%; background: transparent;">
                        <!-- Escena 3D, cámara virtual -->
                        <a-camera id="ar-camera" position="0 0 0" near="0.01" far="10000" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
                        <a-entity id="ar-anchor" visible="false">
                            <!-- Aquí se inyectan las primitivas del animaplano -->
                        </a-entity>
                    </a-scene>
                </div>
            </div>
            <div class="scanner-tools no-print">
                <button class="btn btn-blue" onclick="navigateTo('home-view')">Atrás</button>
                <button class="btn btn-green hidden" id="btn-show-answer" onclick="toggleAnswer()">Ver Figura Esperada</button>
            </div>
            <div style="position:absolute; bottom:5rem; background: rgba(255,255,255,0.9); padding: 0.5rem 1rem; border-radius: 0.5rem; font-weight: bold; z-index:20; border: 2px solid black; text-align: center;" id="scanner-status" class="no-print">Inicializando cámara...</div>
        </div>
    </main>

    <script>
        /**
         * SERVICE WORKER REGISTRATION
         */
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err));
            });
        }

        /**
         * SPA NAVIGATION
         */
        function navigateTo(targetId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.add('hidden'));
            document.getElementById(targetId).classList.remove('hidden');
            
            const headerTools = document.getElementById('header-tools');
            if(targetId === 'home-view') {
                headerTools.classList.add('hidden');
                stopScanner();
            } else {
                headerTools.classList.remove('hidden');
                if(targetId === 'designer-view') {
                    resizeCanvas();
                    drawCartesian();
                } else if(targetId === 'scanner-view') {
                    startScanner();
                }
            }
        }

        /**
         * 10 PLANTILLAS DE ANIMALES EN JSON
         * Estructura: nombre, puntos: [{id, x, y}] 
         * (Se asume conexión secuencial 1->2->3...->N->1 si no hay "segmentos")
         */
        const ANIMALS_LIBRARY = [
            { nombre: "Gato", puntos: [{id:1,x:1,y:1},{id:2,x:5,y:1},{id:3,x:6,y:3},{id:4,x:5,y:5},{id:5,x:4,y:9},{id:6,x:2,y:9},{id:7,x:1,y:5},{id:8,x:0,y:3}] },
            { nombre: "Perro", puntos: [{id:1,x:-2,y:0},{id:2,x:3,y:0},{id:3,x:4,y:2},{id:4,x:4,y:5},{id:5,x:2,y:4},{id:6,x:0,y:4},{id:7,x:-2,y:5},{id:8,x:-2,y:2}] },
            { nombre: "Pez", puntos: [{id:1,x:-6,y:0},{id:2,x:-3,y:3},{id:3,x:2,y:3},{id:4,x:5,y:0},{id:5,x:9,y:-3},{id:6,x:9,y:3},{id:7,x:5,y:0},{id:8,x:2,y:-3},{id:9,x:-3,y:-3}] },
            { nombre: "Mariposa", puntos: [{id:1,x:0,y:5},{id:2,x:3,y:8},{id:3,x:6,y:5},{id:4,x:2,y:1},{id:5,x:5,y:-3},{id:6,x:1,y:-5},{id:7,x:0,y:-2},{id:8,x:-1,y:-5},{id:9,x:-5,y:-3},{id:10,x:-2,y:1},{id:11,x:-6,y:5},{id:12,x:-3,y:8}] },
            { nombre: "Tortuga", puntos: [{id:1,x:-4,y:0},{id:2,x:-2,y:3},{id:3,x:2,y:3},{id:4,x:4,y:0},{id:5,x:6,y:1},{id:6,x:7,y:0},{id:7,x:5,y:-2},{id:8,x:2,y:-2},{id:9,x:2,y:-4},{id:10,x:0,y:-4},{id:11,x:-2,y:-2},{id:12,x:-5,y:-2}] },
            { nombre: "Pájaro", puntos: [{id:1,x:-3,y:0},{id:2,x:-1,y:4},{id:3,x:2,y:5},{id:4,x:5,y:2},{id:5,x:4,y:-1},{id:6,x:8,y:-1},{id:7,x:4,y:-3},{id:8,x:-1,y:-4},{id:9,x:-5,y:-1}] },
            { nombre: "Conejo", puntos: [{id:1,x:0,y:0},{id:2,x:3,y:0},{id:3,x:4,y:3},{id:4,x:5,y:8},{id:5,x:3,y:8},{id:6,x:2,y:6},{id:7,x:1,y:8},{id:8,x:-1,y:8},{id:9,x:0,y:3},{id:10,x:-2,y:1}] },
            { nombre: "Ballena", puntos: [{id:1,x:-7,y:0},{id:2,x:-4,y:3},{id:3,x:2,y:4},{id:4,x:7,y:2},{id:5,x:10,y:4},{id:6,x:8,y:0},{id:7,x:10,y:-2},{id:8,x:7,y:0},{id:9,x:2,y:-2},{id:10,x:-4,y:-1}] },
            { nombre: "Zorro", puntos: [{id:1,x:-3,y:3},{id:2,x:0,y:0},{id:3,x:3,y:3},{id:4,x:5,y:0},{id:5,x:2,y:-4},{id:6,x:-2,y:-4},{id:7,x:-5,y:0}] },
            { nombre: "Cisne", puntos: [{id:1,x:-3,y:2},{id:2,x:-5,y:4},{id:3,x:-3,y:6},{id:4,x:2,y:6},{id:5,x:5,y:2},{id:6,x:6,y:0},{id:7,x:8,y:1},{id:8,x:7,y:-2},{id:9,x:4,y:-4},{id:10,x:0,y:-4},{id:11,x:-4,y:-2},{id:12,x:-6,y:0}] }
        ];

        let currentFigure = { nombre: "Nuevo Animaplano", puntos: [], segmentos: null };

        // Llenar selector
        const select = document.getElementById('library-select');
        ANIMALS_LIBRARY.forEach((anim, idx) => {
            let opt = document.createElement('option');
            opt.value = idx; opt.innerText = anim.nombre;
            select.appendChild(opt);
        });

        function loadPreset(idx) {
            if(idx === "" || !ANIMALS_LIBRARY[idx]) return;
            // Clonar profundo para no alterar la constante
            currentFigure = JSON.parse(JSON.stringify(ANIMALS_LIBRARY[idx]));
            document.getElementById('figure-name').value = currentFigure.nombre;
            rebuildTable();
            drawCartesian();
        }

        /**
         * GESTION DE DATOS / CRUD TABLA
         */
        const tbody = document.getElementById('points-body');

        function rebuildTable() {
            tbody.innerHTML = '';
            currentFigure.puntos.forEach((p, idx) => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${idx + 1}</td>
                    <td><input type="number" value="${p.x}" onchange="updatePoint(${idx}, 'x', this.value)"></td>
                    <td><input type="number" value="${p.y}" onchange="updatePoint(${idx}, 'y', this.value)"></td>
                    <td><button class="btn-icon-small" onclick="deletePoint(${idx})">✖</button></td>
                `;
                tbody.appendChild(tr);
            });
            document.getElementById('animaplano-title') ? document.getElementById('animaplano-title').innerText = currentFigure.nombre : null;
            document.getElementById('print-title').innerText = currentFigure.nombre;
            drawCartesian();
            generateQR();
        }

        function updatePoint(idx, axis, value) {
            currentFigure.puntos[idx][axis] = parseFloat(value) || 0;
            drawCartesian();
            generateQR();
        }

        function deletePoint(idx) {
            currentFigure.puntos.splice(idx, 1);
            // Reasignar IDs secuencialmente
            currentFigure.puntos.forEach((p, i) => p.id = i + 1);
            rebuildTable();
        }

        function addEmptyRow() {
            const nextId = currentFigure.puntos.length + 1;
            currentFigure.puntos.push({ id: nextId, x: 0, y: 0 });
            rebuildTable();
        }

        function updateFigureName() {
            currentFigure.nombre = document.getElementById('figure-name').value || "Animaplano";
            rebuildTable();
        }

        function clearFigure() {
            if(confirm("¿Estás seguro de borrar todas las coordenadas?")) {
                currentFigure.puntos = [];
                currentFigure.segmentos = null;
                const qrCon = document.getElementById('qr-container');
                if(qrCon) qrCon.style.display = 'none';
                rebuildTable();
            }
        }

        function generateQR() {
            if(currentFigure.puntos.length < 2) {
                alert("Agrega al menos 2 puntos para generar el QR.");
                return;
            }
            // Forzamos alineación óptima antes de plasmarla en el QR
            centerFigure();
            drawCartesian();

            // Comprimir la data + Metadatos de Layout EXACTOS
            // Usamos formato v3 ultra-compacto y Error Correction Level L para mayor distancia visual
            const ptsComp = currentFigure.puntos.map(p => `${p.x},${p.y}`).join(';');
            const sRel = (scale / canvas.width).toFixed(3);
            const oxRel = (offsetX / canvas.width).toFixed(3);
            const oyRel = (offsetY / canvas.height).toFixed(3);
            
            // Metadatos de Layout Exactos (Sin padding)
            // Reducimos enormemente la metadata de layout porque es constante en impresión
            // Ya no incluimos el string completo del nombre para ahorrar bytes.
            const qrText = `v3|${ptsComp}|${sRel},${oxRel},${oyRel}`;
            
            const qrContainer = document.getElementById('qr-container');
            const qrCodeDiv = document.getElementById('qrcode');
            
            qrCodeDiv.innerHTML = '';
            qrContainer.style.display = 'block';

            new QRCode(qrCodeDiv, {
                text: qrText,
                width: 256,
                height: 256,
                colorDark : "#000000",
                colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.L // Nivel L: mínimo redundancia, cuadrados más grandes
            });
        }

        /**
         * EXPORTAR E IMPORTAR JSON
         */
        function exportJSON() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(currentFigure, null, 2));
            const dlAnchorElem = document.createElement('a');
            dlAnchorElem.setAttribute("href", dataStr);
            dlAnchorElem.setAttribute("download", `${currentFigure.nombre.replace(/\s+/g, '_')}.json`);
            dlAnchorElem.click();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if(!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const parsed = JSON.parse(e.target.result);
                    if(parsed.puntos && Array.isArray(parsed.puntos)) {
                        currentFigure = parsed;
                        if(!currentFigure.nombre) currentFigure.nombre = "Animaplano Importado";
                        document.getElementById('figure-name').value = currentFigure.nombre;
                        rebuildTable();
                    } else {
                        alert("El JSON no tiene el formato correcto (Falta array 'puntos').");
                    }
                } catch(err) {
                    alert("Error leyendo archivo JSON. Formato inválido.");
                }
            };
            reader.readAsText(file);
        }

        /**
         * MOTOR CARTESIANO (CANVAS INTERACTIVO)
         */
        const canvas = document.getElementById('cartesian-canvas');
        const ctx = canvas.getContext('2d');
        const tooltip = document.getElementById('canvas-tooltip');

        // Estado de Cámara / Viewport
        let scale = 30; // pixeles por unidad
        let offsetX = 0; // offset en pixeles
        let offsetY = 0; // offset en pixeles
        let isDragging = false;
        let dragStartX = 0;
        let dragStartY = 0;

        function resizeCanvas() {
            const parent = canvas.parentElement;
            canvas.width = parent.clientWidth;
            canvas.height = parent.clientHeight;
            // Centrar el origen por defecto
            if(offsetX === 0 && offsetY === 0) {
                offsetX = canvas.width / 2;
                offsetY = canvas.height / 2;
            }
            drawCartesian();
        }
        window.addEventListener('resize', () => {
            if(!document.getElementById('designer-view').classList.contains('hidden')) {
                resizeCanvas();
            }
        });

        // Eventos Pan, Zoom & Inserción por Clic
        canvas.addEventListener('mousedown', (e) => {
            isDragging = true;
            dragStartX = e.clientX - offsetX;
            dragStartY = e.clientY - offsetY;
            canvas.dataset.clickX = e.clientX;
            canvas.dataset.clickY = e.clientY;
            canvas.style.cursor = 'grabbing';
        });

        canvas.addEventListener('mouseup', (e) => { 
            isDragging = false; 
            canvas.style.cursor = 'grab'; 
            
            const clickX = parseFloat(canvas.dataset.clickX);
            const clickY = parseFloat(canvas.dataset.clickY);
            if(Math.abs(e.clientX - clickX) < 5 && Math.abs(e.clientY - clickY) < 5) {
                // Inserción vía Click (no hubo arrastre)
                const rect = canvas.getBoundingClientRect();
                const mouseX = e.clientX - rect.left;
                const mouseY = e.clientY - rect.top;
                
                const mathX = Math.round((mouseX - offsetX) / scale);
                const mathY = Math.round((offsetY - mouseY) / scale);
                
                const exists = currentFigure.puntos.find(p => p.x === mathX && p.y === mathY);
                if(!exists) {
                    currentFigure.puntos.push({ id: currentFigure.puntos.length + 1, x: mathX, y: mathY });
                    const qrCon = document.getElementById('qr-container');
                    if(qrCon) qrCon.style.display = 'none';
                    rebuildTable();
                }
            }
        });
        canvas.addEventListener('mouseleave', () => { isDragging = false; canvas.style.cursor = 'grab'; tooltip.style.display = 'none'; });

        canvas.addEventListener('mousemove', (e) => {
            // Pan (Arrastrar fondo)
            if(isDragging) {
                offsetX = e.clientX - dragStartX;
                offsetY = e.clientY - dragStartY;
                drawCartesian();
                return;
            }

            // Hover sobre puntos (Tooltips)
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            let hoveredPoint = null;
            for(let p of currentFigure.puntos) {
                const screenX = offsetX + (p.x * scale);
                const screenY = offsetY - (p.y * scale); // El eje Y sube en mate, baja en canvas
                const dist = Math.sqrt(Math.pow(mouseX - screenX, 2) + Math.pow(mouseY - screenY, 2));
                if(dist < 10) { // Radio de colisión
                    hoveredPoint = p;
                    break;
                }
            }

            if(hoveredPoint) {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
                tooltip.style.display = 'block';
                tooltip.innerText = `Punto ${hoveredPoint.id}: (${hoveredPoint.x}, ${hoveredPoint.y})`;
            } else {
                tooltip.style.display = 'none';
            }
        });

        canvas.addEventListener('wheel', (e) => {
            e.preventDefault();
            const zoomAmount = e.deltaY > 0 ? 0.9 : 1.1; // 10% de zoom
            
            // Mantener el zoom centrado en el mouse
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            
            offsetX = mouseX - (mouseX - offsetX) * zoomAmount;
            offsetY = mouseY - (mouseY - offsetY) * zoomAmount;
            scale *= zoomAmount;
            
            // Limites de escala
            if(scale < 5) scale = 5;
            if(scale > 150) scale = 150;
            
            drawCartesian();
        });

        function drawCartesian() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const showAxes = document.getElementById('chk-axes').checked;
            const showPoints = document.getElementById('chk-points').checked;
            const showLines = document.getElementById('chk-lines').checked;
            const showLabels = document.getElementById('chk-labels').checked;

            if(showAxes) {
                // Dibujar Grid Menor
                ctx.strokeStyle = '#E5E7EB';
                ctx.lineWidth = 1;
                // Calculamos desde donde dibujar líneas basado en offset
                const startX = Math.floor(-offsetX / scale) - 1;
                const endX = Math.ceil((canvas.width - offsetX) / scale) + 1;
                const startY = Math.floor(-offsetY / scale) - 1; // recordar q Y va invertido
                const endY = Math.ceil((canvas.height - offsetY) / scale) + 1;

                ctx.beginPath();
                for(let x = startX; x <= endX; x++) {
                    const screenX = offsetX + (x * scale);
                    ctx.moveTo(screenX, 0); ctx.lineTo(screenX, canvas.height);
                }
                for(let y = startY; y <= endY; y++) {
                    const screenY = offsetY + (y * scale);
                    ctx.moveTo(0, screenY); ctx.lineTo(canvas.width, screenY);
                }
                ctx.stroke();

                // Dibujar Ejes Principales X / Y
                ctx.strokeStyle = '#9CA3AF';
                ctx.lineWidth = 2;
                ctx.beginPath();
                // Eje Y
                ctx.moveTo(offsetX, 0); ctx.lineTo(offsetX, canvas.height);
                // Eje X
                ctx.moveTo(0, offsetY); ctx.lineTo(canvas.width, offsetY);
                ctx.stroke();

                // Números en los ejes (opcional visual extra)
                ctx.fillStyle = '#6B7280';
                ctx.font = '10px Arial';
                ctx.textAlign = 'center';
                for(let x = startX; x <= endX; x++) {
                    if(x === 0) continue;
                    ctx.fillText(x, offsetX + (x * scale), offsetY + 15);
                }
                ctx.textAlign = 'left';
                for(let y = -endY; y <= -startY + 1; y++) { // Invirtiendo loop para el renderizado numérico
                    if(y === 0) continue;
                    const screenY = offsetY - (y * scale);
                    ctx.fillText(y, offsetX + 5, screenY + 4);
                }
            }

            // DIBUJAR TRAZOS / LÍNEAS
            if(showLines && currentFigure.puntos.length > 1) {
                ctx.strokeStyle = '#4F46E5';
                ctx.lineWidth = 3;
                ctx.lineJoin = 'round';
                ctx.lineCap = 'round';
                ctx.beginPath();
                
                // Si hay segmentos definidos, usar logica de grafos. Si no, secuencial
                if(currentFigure.segmentos && currentFigure.segmentos.length > 0) {
                    currentFigure.segmentos.forEach(seg => {
                        const p1 = currentFigure.puntos.find(p => p.id === seg[0]);
                        const p2 = currentFigure.puntos.find(p => p.id === seg[1]);
                        if(p1 && p2) {
                            ctx.moveTo(offsetX + p1.x * scale, offsetY - p1.y * scale);
                            ctx.lineTo(offsetX + p2.x * scale, offsetY - p2.y * scale);
                        }
                    });
                } else {
                    currentFigure.puntos.forEach((p, idx) => {
                        const screenX = offsetX + p.x * scale;
                        const screenY = offsetY - p.y * scale;
                        if(idx === 0) ctx.moveTo(screenX, screenY);
                        else ctx.lineTo(screenX, screenY);
                    });
                    // Opcional: Cerrar figura secuencial
                    const pFirst = currentFigure.puntos[0];
                    ctx.lineTo(offsetX + pFirst.x * scale, offsetY - pFirst.y * scale);
                }
                ctx.stroke();
            }

            // DIBUJAR PUNTOS
            if(showPoints && currentFigure.puntos.length > 0) {
                currentFigure.puntos.forEach((p, idx) => {
                    const screenX = offsetX + p.x * scale;
                    const screenY = offsetY - p.y * scale;
                    
                    // Circulo
                    ctx.beginPath();
                    ctx.arc(screenX, screenY, 6, 0, 2*Math.PI);
                    ctx.fillStyle = showLines ? '#FFFFFF' : '#4F46E5'; // Huecos si hay lineas activas
                    ctx.fill();
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#4F46E5';
                    ctx.stroke();

                    // Etiqueta del Num / ID
                    if(showLabels) {
                        ctx.fillStyle = '#111827';
                        ctx.font = 'bold 12px Inter';
                        ctx.textAlign = 'left';
                        ctx.fillText(p.id, screenX + 10, screenY - 10);
                    }
                });
            }
        }

        /**
         * MODOS DE IMPRESIÓN (PDF Export config)
         */
        function printMode(tipo) {
            const chkAxes = document.getElementById('chk-axes');
            const chkPoints = document.getElementById('chk-points');
            const chkLines = document.getElementById('chk-lines');
            
            if(tipo === 'reto') {
                chkAxes.checked = true; chkPoints.checked = true; chkLines.checked = false;
            } else if(tipo === 'solucion') {
                chkAxes.checked = true; chkPoints.checked = true; chkLines.checked = true;
            } else if(tipo === 'vacio') {
                chkAxes.checked = true; chkPoints.checked = false; chkLines.checked = false;
            }
            
            // Centrar figura (auto focus origin) antes de imprimir
            if(tipo !== 'vacio') {
                centerFigure();
            } else {
                scale = 30; offsetX = canvas.width/2; offsetY = canvas.height/2;
            }
            
            drawCartesian();
            
            // Un pequeño delay para que el browser renderice el canvas nuevo antes de llamar a print dialog
            setTimeout(() => {
                window.print();
            }, 300);
        }

        // Función auxiliar para auto-centrar la figura en el canvas de cara a la impresión
        function centerFigure() {
            if(currentFigure.puntos.length === 0) return;
            let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
            currentFigure.puntos.forEach(p => {
                if(p.x < minX) minX = p.x;
                if(p.x > maxX) maxX = p.x;
                if(p.y < minY) minY = p.y;
                if(p.y > maxY) maxY = p.y;
            });
            const diffX = maxX - minX === 0 ? 1 : maxX - minX;
            const diffY = maxY - minY === 0 ? 1 : maxY - minY;
            
            const padding = 50; // pixeles
            const scaleX = (canvas.width - padding*2) / diffX;
            const scaleY = (canvas.height - padding*2) / diffY;
            scale = Math.min(scaleX, scaleY);
            if(scale > 60) scale = 60; // Limite de escala maxima

            const centerX = minX + diffX/2;
            const centerY = minY + diffY/2;
            
            offsetX = canvas.width/2 - (centerX * scale);
            offsetY = canvas.height/2 + (centerY * scale); // sumado por inversión eje Y
        }


        /**
         * MOTOR DE ESCÁNER Y AR (jsQR integrado)
         */
        const scannerVideo = document.getElementById('scanner-video');
        const scannerCanvas = document.getElementById('scanner-canvas');
        const scannerCtx = scannerCanvas.getContext('2d');
        const scannerStatus = document.getElementById('scanner-status');
        let scannerStream = null;
        let scanningLoop = null;
        let showingAnswer = false;
        let currentScanData = null;
        
        // Variables para Suavizado (EMA) y Persistencia
        let framesSinceLastQR = 100; // Empezamos alto para indicar que no hay nada
        let smoothedTransform = {
            camCanvasX: 0, camCanvasY: 0, qrW: 0, angle: 0,
            gridCorners: null // Array de {x, y} en coordenadas de cámara (píxeles)
        };
        let lastKnownGridCorners = null;
        let gridTrackingConfidence = 0; // 0 a 100
        const EMA_ALPHA = 0.3; // Factor de suavizado (0 a 1)
        const MAX_PERSISTENCE_FRAMES = 45; // ~1.5 segundos a 30fps

        function toggleAnswer() {
            showingAnswer = !showingAnswer;
            document.getElementById('btn-show-answer').innerText = showingAnswer ? "Ocultar Figura Esperada" : "Ver Figura Esperada";
        }

        function isLineDrawn(imageData, x1, y1, x2, y2) {
            const steps = 25; // Más muestras para precisión
            let darkerThanBgCount = 0;
            const threshold = 35; // Diferencia de brillo requerida (0-255)
            
            for(let i=1; i<steps; i++) {
                let t = i/steps;
                let px = Math.round(x1 + (x2 - x1)*t);
                let py = Math.round(y1 + (y2 - y1)*t);
                
                if(px < 2 || py < 2 || px >= imageData.width - 2 || py >= imageData.height - 2) continue;
                
                // 1. Brillo del Píxel en la Línea Proyectada
                let idx = (py * imageData.width + px) * 4;
                let lineBrightness = (imageData.data[idx] + imageData.data[idx+1] + imageData.data[idx+2]) / 3;
                
                // 2. Brillo del "Fondo" (Muestreamos 5px a un lado de la línea para evitar la propia línea)
                // Vector perpendicular simple
                let dx = x2 - x1;
                let dy = y2 - y1;
                let len = Math.sqrt(dx*dx + dy*dy) || 1;
                let nx = -dy / len * 5; 
                let ny = dx / len * 5;
                
                let bgX = Math.round(px + nx);
                let bgY = Math.round(py + ny);
                let bgIdx = (bgY * imageData.width + bgX) * 4;
                let bgBrightness = (imageData.data[bgIdx] + imageData.data[bgIdx+1] + imageData.data[bgIdx+2]) / 3;

                // 3. Comparación Diferencial: Si la línea es significativamente más oscura que su fondo inmediato
                if (lineBrightness < (bgBrightness - threshold)) { 
                    darkerThanBgCount++;
                }
            }
            // Requiere que el 55% de la línea sea consistentemente más oscura que el papel de fondo
            return darkerThanBgCount >= (steps * 0.55); 
        }

        async function startScanner() {
            try {
                const constraints = { 
                    video: { 
                        facingMode: "environment",
                        width: { ideal: 1920 },
                        height: { ideal: 1080 }
                    } 
                };
                scannerStream = await navigator.mediaDevices.getUserMedia(constraints);
                scannerVideo.srcObject = scannerStream;
                
                // Intentar aplicar configuraciones avanzadas si el navegador lo permite
                const track = scannerStream.getVideoTracks()[0];
                const capabilities = track.getCapabilities ? track.getCapabilities() : {};
                
                const advancedConstraints = {};
                if (capabilities.focusMode && capabilities.focusMode.includes('continuous')) {
                    advancedConstraints.focusMode = 'continuous';
                }
                if (capabilities.whiteBalanceMode && capabilities.whiteBalanceMode.includes('continuous')) {
                    advancedConstraints.whiteBalanceMode = 'continuous';
                }
                
                if (Object.keys(advancedConstraints).length > 0) {
                    track.applyConstraints({ advanced: [advancedConstraints] }).catch(e => console.log("Constraints no soportados", e));
                }

                scannerVideo.onloadedmetadata = () => {
                    scannerCanvas.width = scannerVideo.videoWidth;
                    scannerCanvas.height = scannerVideo.videoHeight;
                };
                
                requestAnimationFrame(tickScanner);
                scannerStatus.innerText = "Buscando Código QR...";
            } catch(e) { 
                console.error(e);
                document.getElementById('scanner-status').innerText = "Cámara no disponible."; 
            }
        }

        function stopScanner() {
            if(scannerStream) scannerStream.getTracks().forEach(t => t.stop());
            if(scanningLoop) cancelAnimationFrame(scanningLoop);
            scannerCtx.clearRect(0,0, scannerCanvas.width, scannerCanvas.height);
        }

        function tickScanner() {
            if (scannerVideo.readyState === scannerVideo.HAVE_ENOUGH_DATA) {
                scannerCanvas.width = scannerVideo.videoWidth;
                scannerCanvas.height = scannerVideo.videoHeight;
                scannerCtx.clearRect(0, 0, scannerCanvas.width, scannerCanvas.height);
                
                const offCanvas = document.createElement('canvas');
                offCanvas.width = scannerVideo.videoWidth;
                offCanvas.height = scannerVideo.videoHeight;
                const offCtx = offCanvas.getContext('2d', {willReadFrequently: true});
                offCtx.drawImage(scannerVideo, 0, 0, offCanvas.width, offCanvas.height);
                const frameData = offCtx.getImageData(0, 0, offCanvas.width, offCanvas.height);

                if (!currentScanData) {
                    scannerStatus.innerText = "👉 ENFOCA EL PLANO IMPRESO COMPLETO Y EL QR 👈";
                }

                if(typeof jsQR !== "undefined") {
                    const code = jsQR(frameData.data, frameData.width, frameData.height, { inversionAttempts: "dontInvert" });
                    
                    if (code) {
                        try {
                            // Soporte para v3 (Ultra-Compacto), v2 y fallback JSON
                            if (code.data.startsWith('v3|')) {
                                const [version, ptsStr, metaStr] = code.data.split('|');
                                const ptsArr = ptsStr.split(';').map(s => s.split(',').map(Number));
                                const metaArr = metaStr.split(',').map(Number);
                                
                                currentScanData = {
                                    n: "Figura Detectada",
                                    p: ptsArr,
                                    s: metaArr[0],
                                    ox: metaArr[1],
                                    oy: metaArr[2],
                                    qx: 0.63, // Valor estático impreso en layout
                                    qy: 0.02,
                                    qw: 0.35
                                };
                            } else if (code.data.startsWith('v2|')) {
                                const [version, name, ptsStr, metaStr] = code.data.split('|');
                                const ptsArr = ptsStr.split(';').map(s => s.split(',').map(Number));
                                const metaArr = metaStr.split(',').map(Number);
                                
                                currentScanData = {
                                    n: name,
                                    p: ptsArr,
                                    s: metaArr[0],
                                    ox: metaArr[1],
                                    oy: metaArr[2],
                                    qx: metaArr[3],
                                    qy: metaArr[4],
                                    qw: metaArr[5]
                                };
                            } else {
                                const data = JSON.parse(code.data);
                                if (data.p) currentScanData = data;
                            }
                        } catch(e) { console.error("Error parsing QR", e); }

                        if (currentScanData) {
                            // 1. Datos Brutos del QR actual
                            const qrTopLeftX = code.location.topLeftCorner.x;
                            const qrTopLeftY = code.location.topLeftCorner.y;
                            const qrTopRightX = code.location.topRightCorner.x;
                            const qrTopRightY = code.location.topRightCorner.y;
                            
                            const rawQrW = Math.sqrt(Math.pow(qrTopRightX - qrTopLeftX, 2) + Math.pow(qrTopRightY - qrTopLeftY, 2));
                            const rawAngle = Math.atan2(qrTopRightY - qrTopLeftY, qrTopRightX - qrTopLeftX);

                            // 2. Aplicar Suavizado EMA
                            if (framesSinceLastQR > MAX_PERSISTENCE_FRAMES) {
                                // Primer frame después de mucho tiempo: Inicializar sin suavizado
                                smoothedTransform.qrW = rawQrW;
                                smoothedTransform.angle = rawAngle;
                                smoothedTransform.camCanvasX = qrTopLeftX; // Temporal, se ajusta abajo
                                smoothedTransform.camCanvasY = qrTopLeftY;
                            } else {
                                smoothedTransform.qrW = (rawQrW * EMA_ALPHA) + (smoothedTransform.qrW * (1 - EMA_ALPHA));
                                // Para el ángulo usamos un wrap simple si es necesario, pero atan2 es estable
                                smoothedTransform.angle = (rawAngle * EMA_ALPHA) + (smoothedTransform.angle * (1 - EMA_ALPHA));
                            }

                            // 3. Extrapolación Matemática según METADATOS del QR
                            const qxRatio = currentScanData.qx || 0.63;
                            const qyRatio = currentScanData.qy || 0.02;
                            const qwRatio = currentScanData.qw || 0.35;

                            const cw = smoothedTransform.qrW / qwRatio; 
                            
                            // 4. Origen del CartesianCanvas vectorizado
                            const vecX = -qxRatio * cw;
                            const vecY = -qyRatio * cw;
                            const rotVecX = vecX * Math.cos(smoothedTransform.angle) - vecY * Math.sin(smoothedTransform.angle);
                            const rotVecY = vecX * Math.sin(smoothedTransform.angle) + vecY * Math.cos(smoothedTransform.angle);
                            
                            const rawCamCanvasX = qrTopLeftX + rotVecX;
                            const rawCamCanvasY = qrTopLeftY + rotVecY;

                            if (framesSinceLastQR > MAX_PERSISTENCE_FRAMES) {
                                smoothedTransform.camCanvasX = rawCamCanvasX;
                                smoothedTransform.camCanvasY = rawCamCanvasY;
                            } else {
                                smoothedTransform.camCanvasX = (rawCamCanvasX * EMA_ALPHA) + (smoothedTransform.camCanvasX * (1 - EMA_ALPHA));
                                smoothedTransform.camCanvasY = (rawCamCanvasY * EMA_ALPHA) + (smoothedTransform.camCanvasY * (1 - EMA_ALPHA));
                            }

                            framesSinceLastQR = 0; // Reset de persistencia
                            scannerStatus.innerText = "¡QR Detectado! Encuadra el plano completo.";
                            document.getElementById('btn-show-answer').classList.remove('hidden');

                            // --- NUEVA LÓGICA HYBRID: DETECCIÓN DE MARCO ---
                            const detectedRectangle = detectGridRectangle(frameData);
                            
                            if (detectedRectangle) {
                                smoothedTransform.gridCorners = detectedRectangle;
                                gridTrackingConfidence = Math.min(100, gridTrackingConfidence + 20);
                            } else {
                                gridTrackingConfidence = Math.max(0, gridTrackingConfidence - 10);
                            }

                            // 5. Proyección Transformacional (Híbrida)
                            let pts = currentScanData.p.map(arr => ({x: arr[0], y: arr[1]}));
                            let projectedPts = [];

                            if (gridTrackingConfidence > 30 && smoothedTransform.gridCorners) {
                                // TRACKING POR RECTÁNGULO (Mucho más estable)
                                scannerStatus.innerText = "⭐ Seguimiento de Plano Activado (Alta Estabilidad)";
                                projectedPts = projectPointsToGrid(pts, smoothedTransform.gridCorners, currentScanData);
                            } else {
                                // FALLBACK: TRACKING POR QR (Solo si el marco falla)
                                let sRatio = currentScanData.s || 0.05;
                                let oxRatio = currentScanData.ox || 0.5;
                                let oyRatio = currentScanData.oy || 0.5;
                                
                                projectedPts = pts.map(pt => {
                                    let relPx = (pt.x * sRatio) + oxRatio;
                                    let relPy = oyRatio - (pt.y * sRatio);
                                    let px_unrotated = relPx * cw;
                                    let py_unrotated = relPy * cw;
                                    return {
                                        px: smoothedTransform.camCanvasX + (px_unrotated * Math.cos(smoothedTransform.angle) - py_unrotated * Math.sin(smoothedTransform.angle)),
                                        py: smoothedTransform.camCanvasY + (px_unrotated * Math.sin(smoothedTransform.angle) + py_unrotated * Math.cos(smoothedTransform.angle))
                                    };
                                });
                            }
                            
                            // 6. Motor Visual Evaluador
                            renderOverlay(projectedPts, frameData);
                        }
                    } else if (currentScanData && framesSinceLastQR < MAX_PERSISTENCE_FRAMES) {
                        framesSinceLastQR++;
                        scannerStatus.innerText = "⚡ Mantén la hoja visible (Modo Persistencia)";
                        
                        const detectedRectangle = detectGridRectangle(frameData);
                        if(detectedRectangle) {
                            smoothedTransform.gridCorners = detectedRectangle;
                            gridTrackingConfidence = 100;
                        }

                        let pts = currentScanData.p.map(arr => ({x: arr[0], y: arr[1]}));
                        let projectedPts = [];

                        if (gridTrackingConfidence > 30 && smoothedTransform.gridCorners) {
                            projectedPts = projectPointsToGrid(pts, smoothedTransform.gridCorners, currentScanData);
                        } else {
                            // Fallback smoothed transform
                            const qwRatio = currentScanData.qw || 0.35;
                            const cw = smoothedTransform.qrW / qwRatio; 
                            let sRatio = currentScanData.s || 0.05;
                            let oxRatio = currentScanData.ox || 0.5;
                            let oyRatio = currentScanData.oy || 0.5;

                            projectedPts = pts.map(pt => {
                                let relPx = (pt.x * sRatio) + oxRatio;
                                let relPy = oyRatio - (pt.y * sRatio);
                                let px_unrotated = relPx * cw;
                                let py_unrotated = relPy * cw;
                                return {
                                    px: smoothedTransform.camCanvasX + (px_unrotated * Math.cos(smoothedTransform.angle) - py_unrotated * Math.sin(smoothedTransform.angle)),
                                    py: smoothedTransform.camCanvasY + (px_unrotated * Math.sin(smoothedTransform.angle) + py_unrotated * Math.cos(smoothedTransform.angle))
                                };
                            });
                        }
                        renderOverlay(projectedPts, frameData);

                    } else if (!currentScanData) {
                         scannerStatus.innerText = "👉 ENFOCA EL PLANO IMPRESO Y EL QR 👈";
                    } else {
                         scannerStatus.innerText = "¡Mueve tu celular e incluye el QR visualmente!";
                         framesSinceLastQR++;
                    }
                }
            }
            scanningLoop = requestAnimationFrame(tickScanner);
        }

        // Nueva función para modularizar el renderizado del overlay 2D y puente al 3D
        function renderOverlay(projectedPts, frameData) {
            let correctLines = 0;
            let isDrawnStats = [];
            scannerCtx.lineWidth = 6;
            scannerCtx.lineCap = 'round';

            for(let i = 0; i < projectedPts.length; i++) {
                let p1 = projectedPts[i];
                let p2 = (i === projectedPts.length - 1) ? projectedPts[0] : projectedPts[i+1];
                const isDrawn = isLineDrawn(frameData, p1.px, p1.py, p2.px, p2.py);
                
                if(isDrawn) {
                    correctLines++;
                    scannerCtx.strokeStyle = 'rgba(16, 185, 129, 0.9)'; 
                } else {
                    scannerCtx.strokeStyle = 'rgba(239, 68, 68, 0.6)'; 
                }

                if(isDrawn || showingAnswer) {
                    scannerCtx.beginPath();
                    scannerCtx.moveTo(p1.px, p1.py);
                    scannerCtx.lineTo(p2.px, p2.py);
                    scannerCtx.stroke();
                }
                
                // Track for 3D
                isDrawnStats.push(isDrawn);
            }
            
            const isAllCorrect = correctLines === projectedPts.length;
            if (framesSinceLastQR === 0) {
                scannerStatus.innerText = `Revisión Viva: ${correctLines}/${projectedPts.length} uniones perfectas.`;
                if(isAllCorrect) scannerStatus.innerText = "🌟 ¡PERFECTO! MIRA LA SUPERFICIE. 🌟";
            }

            scannerCtx.fillStyle = '#1F2937'; 
            scannerCtx.strokeStyle = '#FFFFFF';
            scannerCtx.lineWidth = 2;
            projectedPts.forEach(pt => {
                scannerCtx.beginPath();
                scannerCtx.arc(pt.px, pt.py, 4, 0, Math.PI * 2);
                scannerCtx.fill();
                scannerCtx.stroke();
            });

            // Sincronizar Capa de Realidad Aumentada Espacial (A-Frame)
            updateAFramePose(frameData.width, frameData.height);
            updateAFrameGeometry(currentScanData, isDrawnStats, isAllCorrect);
        }

        // --- MOTOR DE REALIDAD AUMENTADA ESPACIAL (A-FRAME) ---
        let geometryInitialized = false;
        let lastFigureName = "";
        let isLevitating = false;

        function updateAFramePose(frameWidth, frameHeight) {
            // Requerimos que OpenCV esté listo y tengamos un marco estable
            if (typeof cv === 'undefined' || !cv.Mat || gridTrackingConfidence < 10 || !smoothedTransform.gridCorners) return;
            
            const anchor = document.getElementById('ar-anchor');
            if(!anchor) return;

            // 1. Configurar la matriz de la cámara Virtual (A-Frame)
            if (!window.cameraConfigured) {
                const camEl = document.getElementById('ar-camera');
                if (camEl && camEl.components.camera && camEl.components.camera.camera) {
                    const tcam = camEl.components.camera.camera;
                    const focalLength = frameWidth; // Distancia focal empírica estándar
                    tcam.projectionMatrix.elements[0] = 2 * focalLength / frameWidth;
                    tcam.projectionMatrix.elements[5] = 2 * focalLength / frameHeight;
                    tcam.projectionMatrix.elements[8] = 0; 
                    tcam.projectionMatrix.elements[9] = 0; 
                    window.cameraConfigured = true;
                }
            }

            // 2. Modelo 3D del Marco Físico (Asumimos hoja de papel de aprox 18cm util)
            const W = 0.18; 
            let objPts = cv.matFromArray(4, 1, cv.CV_32FC3, [
                -W/2,  W/2, 0, // Upper Left
                 W/2,  W/2, 0, // Upper Right
                 W/2, -W/2, 0, // Bottom Right
                -W/2, -W/2, 0  // Bottom Left
            ]);

            // 3. Puntos 2D detectados en cámara
            let imgPts = cv.matFromArray(4, 1, cv.CV_32FC2, [
                smoothedTransform.gridCorners[0].x, smoothedTransform.gridCorners[0].y,
                smoothedTransform.gridCorners[1].x, smoothedTransform.gridCorners[1].y,
                smoothedTransform.gridCorners[2].x, smoothedTransform.gridCorners[2].y,
                smoothedTransform.gridCorners[3].x, smoothedTransform.gridCorners[3].y
            ]);

            // Intrínsecas
            let focalLength = frameWidth;
            let cx = frameWidth / 2;
            let cy = frameHeight / 2;
            let camMat = cv.matFromArray(3, 3, cv.CV_64F, [
                focalLength, 0, cx,
                0, focalLength, cy,
                0, 0, 1
            ]);
            let distCoeffs = cv.Mat.zeros(4, 1, cv.CV_64F);
            let rvec = new cv.Mat();
            let tvec = new cv.Mat();
            
            // Computar Extrínsecas (Pose)
            let success = cv.solvePnP(objPts, imgPts, camMat, distCoeffs, rvec, tvec, false, cv.SOLVEPNP_ITERATIVE);
            
            if (success) {
                let rmat = new cv.Mat();
                cv.Rodrigues(rvec, rmat);
                
                // Conversión CV (Y down, Z fwd) -> WebGL (Y up, Z back)
                let tempMat = new THREE.Matrix4();
                tempMat.set(
                     rmat.doublePtr(0,0), -rmat.doublePtr(0,1), -rmat.doublePtr(0,2), tvec.doublePtr(0),
                    -rmat.doublePtr(1,0),  rmat.doublePtr(1,1),  rmat.doublePtr(1,2), -tvec.doublePtr(1),
                    -rmat.doublePtr(2,0),  rmat.doublePtr(2,1),  rmat.doublePtr(2,2), -tvec.doublePtr(2),
                     0, 0, 0, 1
                );
                
                // Suavizar fuertemente usando EMA para estabilidad a 50cm+ de distancia
                if(!window.lastMat) window.lastMat = tempMat.clone();
                for(let i=0; i<16; i++) {
                    window.lastMat.elements[i] = (tempMat.elements[i] * 0.15) + (window.lastMat.elements[i] * 0.85);
                }

                // Aplicar Pose al Ancla
                window.lastMat.decompose(anchor.object3D.position, anchor.object3D.quaternion, anchor.object3D.scale);
                anchor.setAttribute('visible', 'true');
                
                rmat.delete();
            }
            
            objPts.delete(); imgPts.delete(); camMat.delete(); distCoeffs.delete();
            rvec.delete(); tvec.delete();
        }

        function updateAFrameGeometry(scanData, isDrawnStats, isAllCorrect) {
            const anchor = document.getElementById('ar-anchor');
            if(!anchor || !scanData) return;

            // Reset cuando cambia la figura
            if(lastFigureName !== scanData.n) {
                anchor.innerHTML = '';
                geometryInitialized = false;
                isLevitating = false;
                lastFigureName = scanData.n;
                
                // HUD panel
                let hud = document.createElement('a-entity');
                hud.setAttribute('id', 'ar-hud');
                hud.setAttribute('position', '0 0.1 0');
                hud.setAttribute('rotation', '-90 0 0'); // plano en XZ (mirando arriba)
                hud.setAttribute('text', `value: ${scanData.n}; color: #4F46E5; align: center; width: 0.5; font: dejavu;`);
                anchor.appendChild(hud);
            }

            let sRatio = scanData.s || 0.05;
            let oxRatio = scanData.ox || 0.5;
            let oyRatio = scanData.oy || 0.5;
            const modelScale = 0.18; 

            if(!geometryInitialized) {
                scanData.p.forEach((pt) => {
                    let relX = (pt[0] * sRatio) + oxRatio;
                    let relY = oyRatio - (pt[1] * sRatio);
                    
                    let px = (relX - 0.5) * modelScale; 
                    let py = -(relY - 0.5) * modelScale; 
                    
                    let sphere = document.createElement('a-sphere');
                    sphere.setAttribute('position', `${px} ${py} 0`);
                    sphere.setAttribute('radius', '0.003');
                    sphere.setAttribute('color', '#4F46E5');
                    anchor.appendChild(sphere);
                });

                for(let i=0; i<scanData.p.length; i++) {
                    let p1 = scanData.p[i];
                    let p2 = (i === scanData.p.length - 1) ? scanData.p[0] : scanData.p[i+1];
                    let relX1 = (p1[0] * sRatio) + oxRatio; let relY1 = oyRatio - (p1[1] * sRatio);
                    let relX2 = (p2[0] * sRatio) + oxRatio; let relY2 = oyRatio - (p2[1] * sRatio);
                    let px1 = (relX1 - 0.5) * modelScale; let py1 = -(relY1 - 0.5) * modelScale;
                    let px2 = (relX2 - 0.5) * modelScale; let py2 = -(relY2 - 0.5) * modelScale;

                    let distance = Math.sqrt(Math.pow(px2-px1,2) + Math.pow(py2-py1,2));
                    let midX = (px1+px2)/2; let midY = (py1+py2)/2;
                    let angle = Math.atan2(py2-py1, px2-px1) * (180/Math.PI);

                    let cylinder = document.createElement('a-cylinder');
                    cylinder.setAttribute('id', `ar-line-${i}`);
                    cylinder.setAttribute('position', `${midX} ${midY} 0.001`);
                    cylinder.setAttribute('rotation', `90 0 ${angle + 90}`); // Cilindro default crece en Y
                    cylinder.setAttribute('radius', '0.0015');
                    cylinder.setAttribute('height', distance);
                    cylinder.setAttribute('color', '#EF4444');
                    cylinder.setAttribute('opacity', '0.5'); 
                    anchor.appendChild(cylinder);
                }
                geometryInitialized = true;
            }

            // Real-time Feedback
            if(geometryInitialized && !isLevitating) {
                isDrawnStats.forEach((isDrawn, idx) => {
                    let cyl = document.getElementById(`ar-line-${idx}`);
                    if(cyl) {
                        if(isDrawn) {
                            cyl.setAttribute('color', '#10B981');
                            cyl.setAttribute('opacity', '1.0');
                        } else {
                            cyl.setAttribute('color', '#EF4444');
                            cyl.setAttribute('opacity', '0.5');
                        }
                    }
                });

                // Efecto Magico Levitativo al completar
                if(isAllCorrect) {
                    isLevitating = true;
                    // Mover ancla hacia Z+ virtual (Arriba en el papel físico)
                    anchor.setAttribute('animation', `property: position; to: ${anchor.object3D.position.x} ${anchor.object3D.position.y} -0.15; dur: 2000; easing: easeOutElastic`);
                    
                    let hud = document.getElementById('ar-hud');
                    if(hud) {
                        hud.setAttribute('text', `value: ${scanData.n} - LOGRADO PERFECTO!; color: #10B981; align: center; width: 0.8; font: dejavu;`);
                    }
                }
            }
        }

        // --- MOTOR DE VISIÓN ARTIFICIAL (OPENCV.JS) ---
        
        function detectGridRectangle(frameData) {
            if (typeof cv === 'undefined' || !cv.Mat) return null;
            
            let src = cv.matFromImageData(frameData);
            let dst = new cv.Mat();
            
            // 1. Preprocesamiento: Grayscale + Blur + Canny
            cv.cvtColor(src, dst, cv.COLOR_RGBA2GRAY);
            cv.GaussianBlur(dst, dst, new cv.Size(5, 5), 0);
            cv.Canny(dst, dst, 50, 150);
            
            // 2. Encontrar Contornos
            let contours = new cv.MatVector();
            let hierarchy = new cv.Mat();
            cv.findContours(dst, contours, hierarchy, cv.RETR_EXTERNAL, cv.CHAIN_APPROX_SIMPLE);
            
            let bestRect = null;
            let maxArea = 0;
            
            for (let i = 0; i < contours.size(); ++i) {
                let cnt = contours.get(i);
                let area = cv.contourArea(cnt);
                let perimeter = cv.arcLength(cnt, true);
                let approx = new cv.Mat();
                cv.approxPolyDP(cnt, approx, 0.02 * perimeter, true);
                
                // Buscamos el rectángulo más grande (cuadrilátero convexo)
                if (approx.rows === 4 && area > (src.rows * src.cols * 0.08) && cv.isContourConvex(approx)) {
                    if (area > maxArea) {
                        maxArea = area;
                        // Extraer esquinas y ordenarlas (TL, TR, BR, BL)
                        let pts = [];
                        for (let j = 0; j < 4; j++) {
                            pts.push({ x: approx.data32S[j * 2], y: approx.data32S[j * 2 + 1] });
                        }
                        bestRect = orderCorners(pts);
                    }
                }
                approx.delete();
            }
            
            // Limpiar memoria OpenCV (CRÍTICO)
            src.delete(); dst.delete(); contours.delete(); hierarchy.delete();
            
            return bestRect;
        }

        function orderCorners(pts) {
            // Orden: Superior-Izquierda (TL), Superior-Derecha (TR), Inferior-Derecha (BR), Inferior-Izquierda (BL)
            pts.sort((a, b) => a.y - b.y);
            let top = pts.slice(0, 2).sort((a, b) => a.x - b.x);
            let bottom = pts.slice(2, 4).sort((a, b) => b.x - a.x);
            return [top[0], top[1], bottom[0], bottom[1]];
        }

        function projectPointsToGrid(pts, grid, scanData) {
            // Usamos las 4 esquinas del grid para proyectar los puntos relativos
            // grid[0]=TL, grid[1]=TR, grid[2]=BR, grid[3]=BL
            
            let sRatio = scanData.s || 0.05;
            let oxRatio = scanData.ox || 0.5;
            let oyRatio = scanData.oy || 0.5;

            return pts.map(pt => {
                let relX = (pt.x * sRatio) + oxRatio;
                let relY = oyRatio - (pt.y * sRatio);
                
                // Interpolación Bilineal Simple entre las 4 esquinas del marco
                let topX = grid[0].x + (grid[1].x - grid[0].x) * relX;
                let topY = grid[0].y + (grid[1].y - grid[0].y) * relX;
                let botX = grid[3].x + (grid[2].x - grid[3].x) * relX;
                let botY = grid[3].y + (grid[2].y - grid[3].y) * relX;
                
                return {
                    px: topX + (botX - topX) * relY,
                    py: topY + (botY - topY) * relY
                };
            });
        }


    </script>
